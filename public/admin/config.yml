backend:
  name: github
  repo: RCIDS3S/website
  branch: main
  base_url: https://website-bgu.pages.dev
  auth_endpoint: api/auth

local_backend: true
publish_mode: editorial_workflow

media_folder: "public/assets/images"
public_folder: "/assets/images"

site_url: "https://website-bgu.pages.dev"
display_url: "https://website-bgu.pages.dev"
logo_url: "/assets/images/third-sophistic.png"

collections:
  - name: "settings"
    label: "Homepage and Site Settings"
    files:
      - label: "Identity and SEO"
        name: "identity"
        file: "src/data/site/identity.json"
        format: "json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Skip Link Text", name: "skipLinkText", widget: "string" }

      - label: "Navigation"
        name: "navigation"
        file: "src/data/site/navigation.json"
        format: "json"
        fields:
          - { label: "Events Link Text", name: "eventsText", widget: "string" }
          - { label: "Resources Link Text", name: "resourcesText", widget: "string" }
          - { label: "Opportunity Radar Link Text", name: "opportunitiesText", widget: "string" }
          - { label: "Officers Link Text", name: "officersText", widget: "string" }
          - { label: "About Link Text", name: "aboutText", widget: "string" }
          - { label: "Contact Link Text", name: "contactText", widget: "string" }
          - { label: "Archive Link Text", name: "archiveText", widget: "string" }

      - label: "Hero"
        name: "hero"
        file: "src/data/site/hero.json"
        format: "json"
        fields:
          - { label: "Small Label Above Hero Title", name: "eyebrow", widget: "string" }
          - { label: "Hero Title", name: "title", widget: "string" }
          - { label: "Hero Text", name: "text", widget: "text" }
          - { label: "Primary Button Text", name: "primaryActionText", widget: "string" }
          - { label: "Primary Button URL", name: "primaryActionUrl", widget: "string" }
          - { label: "Secondary Button Text", name: "secondaryActionText", widget: "string" }
          - { label: "Secondary Button URL", name: "secondaryActionUrl", widget: "string" }

      - label: "Student Desk"
        name: "student_desk"
        file: "src/data/site/student-desk.json"
        format: "json"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Term", name: "term", widget: "string" }

      - label: "Contact"
        name: "contact"
        file: "src/data/site/contact.json"
        format: "json"
        fields:
          - { label: "Small Label Above Contact Title", name: "kicker", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text", name: "text", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Email Button Text", name: "emailButtonText", widget: "string" }
          - { label: "Social URL", name: "socialUrl", widget: "string" }
          - { label: "Social Button Text", name: "socialButtonText", widget: "string" }

      - label: "Footer"
        name: "footer"
        file: "src/data/site/footer.json"
        format: "json"
        fields:
          - { label: "Footer Text", name: "text", widget: "string" }

      - label: "Student Desk Quick Links"
        name: "quick_links"
        file: "src/data/quick-links.json"
        format: "json"
        fields:
          - label: "Quick Links"
            name: "items"
            widget: "list"
            collapsed: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "about"
    label: "About"
    files:
      - label: "About Section"
        name: "about"
        file: "src/data/about.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            collapsed: false
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

  - name: "events"
    label: "Events"
    files:
      - label: "Events Section"
        name: "events"
        file: "src/data/events.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Events"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Display Date", name: "date", widget: "string" }
              - { label: "Machine Date", name: "datetime", widget: "string", hint: "Use YYYY-MM or YYYY-MM-DD." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Status", name: "status", widget: "string", default: "Details TBA" }

  - name: "resources"
    label: "Resources"
    files:
      - label: "Resources Section"
        name: "resources"
        file: "src/data/resources.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Resources"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}} - {{fields.title}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal", value: "normal" }
                  - { label: "Muted / Placeholder", value: "muted" }

  - name: "officers"
    label: "Officers"
    files:
      - label: "Officers Section"
        name: "officers"
        file: "src/data/officers.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Officers"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.role}} - {{fields.name}}"
            fields:
              - { label: "Show Role", name: "showRole", widget: "boolean", default: true }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "opportunities"
    label: "Opportunity Radar"
    files:
      - label: "Opportunity Radar Page Copy"
        name: "opportunities_page"
        file: "src/data/opportunities.json"
        format: "json"
        fields:
          - { label: "Last Updated", name: "updated", widget: "string", hint: "Use YYYY-MM-DD." }
          - label: "Page Summary"
            name: "summary"
            widget: "object"
            collapsed: false
            hint: "This copy is preserved when the automated opportunity scan refreshes the item list."
            fields:
              - { label: "Small Label Above Page Title", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Published Items"
            name: "items"
            widget: "hidden"
            required: false

      - label: "Opportunity Radar Labels and Controls"
        name: "opportunity_ui"
        file: "src/data/opportunities-ui.json"
        format: "json"
        fields:
          - { label: "Browser Tab Title", name: "metaTitle", widget: "string" }
          - { label: "Search Engine Description", name: "metaDescription", widget: "text" }
          - { label: "Skip Link Text", name: "skipLinkText", widget: "string" }
          - { label: "Navigation Accessibility Label", name: "navigationLabel", widget: "string", hint: "Usually invisible, but useful for screen readers." }
          - label: "Top Navigation Links"
            name: "navLinks"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Status Cards"
            name: "stats"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accessibility Label", name: "ariaLabel", widget: "string" }
              - { label: "Open Calls Label", name: "openCallsLabel", widget: "string" }
              - { label: "This Week Label", name: "urgentLabel", widget: "string" }
              - { label: "Coming Up Label", name: "soonLabel", widget: "string" }
              - { label: "Discovery Sources Label", name: "sourcesLabel", widget: "string" }
              - { label: "New Here Label", name: "newLabel", widget: "string" }
          - label: "Browse by Purpose Heading"
            name: "purposeSection"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accessibility Label", name: "ariaLabel", widget: "string" }
              - { label: "Small Label Above Heading", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
          - label: "Browse by Purpose Cards"
            name: "purposeOptions"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Card Label", name: "label", widget: "string" }
              - { label: "Card Text", name: "text", widget: "text" }
              - { label: "Advanced: Type Filter", name: "filterType", widget: "string", required: false, hint: "Leave this alone unless changing how the card filters results." }
              - { label: "Advanced: Field Filter", name: "filterField", widget: "string", required: false, hint: "Leave this alone unless changing how the card filters results." }
              - { label: "Advanced: Search Filter", name: "filterQuery", widget: "string", required: false, hint: "Leave this alone unless changing how the card filters results." }
          - label: "Search and Filter Controls"
            name: "filters"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accessibility Label", name: "ariaLabel", widget: "string" }
              - { label: "Search Label", name: "searchLabel", widget: "string" }
              - { label: "Search Placeholder", name: "searchPlaceholder", widget: "string" }
              - { label: "Field Filter Label", name: "fieldLabel", widget: "string" }
              - { label: "All Fields Option", name: "allFieldsLabel", widget: "string" }
              - { label: "Type Filter Label", name: "typeLabel", widget: "string" }
              - { label: "All Types Option", name: "allTypesLabel", widget: "string" }
              - { label: "Sort Label", name: "sortLabel", widget: "string" }
              - label: "Sort Options"
                name: "sortOptions"
                widget: "list"
                collapsed: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Advanced: Sort Value", name: "value", widget: "string", hint: "Leave this alone unless changing sort behavior." }
              - { label: "New Button Label", name: "newButtonLabel", widget: "string" }
              - { label: "Saved Button Label", name: "savedButtonLabel", widget: "string" }
              - { label: "Map Button Label", name: "mapButtonLabel", widget: "string" }
          - label: "Result Group Headings"
            name: "groups"
            widget: "object"
            collapsed: false
            fields:
              - label: "Due Soon"
                name: "dueSoon"
                widget: "object"
                collapsed: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Media, Film & Art"
                name: "mediaArt"
                widget: "object"
                collapsed: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Journals & Collections"
                name: "publications"
                widget: "object"
                collapsed: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Conferences & CFPs"
                name: "conferences"
                widget: "object"
                collapsed: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Funding & Fellowships"
                name: "funding"
                widget: "object"
                collapsed: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
          - label: "Map Text"
            name: "map"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Small Label Above Map Title", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Map Accessibility Label", name: "canvasLabel", widget: "string" }
              - { label: "Mapped List Accessibility Label", name: "listLabel", widget: "string" }
              - { label: "Locations Label", name: "locationsSuffix", widget: "string" }
              - { label: "Mapped Calls Label", name: "mappedCallsSuffix", widget: "string" }
              - { label: "Online/Virtual Label", name: "virtualSuffix", widget: "string" }
              - { label: "Loading Title", name: "loadingTitle", widget: "string" }
              - { label: "Loading Text", name: "loadingText", widget: "string" }
              - { label: "Call Singular", name: "callSingular", widget: "string" }
              - { label: "Call Plural", name: "callPlural", widget: "string" }
              - { label: "Event Date Fallback", name: "eventDateFallback", widget: "string" }
              - { label: "Rolling Deadline Label", name: "rollingDeadlineLabel", widget: "string" }
              - { label: "More At Location Suffix", name: "moreAtLocationSuffix", widget: "string" }
              - { label: "More In List Suffix", name: "moreInListSuffix", widget: "string" }
              - { label: "Marker Opportunity Singular", name: "markerOpportunitySingular", widget: "string" }
              - { label: "Marker Opportunity Plural", name: "markerOpportunityPlural", widget: "string" }
              - { label: "Popup List Label Prefix", name: "popupListLabelPrefix", widget: "string" }
              - { label: "Map Unavailable Title", name: "unavailableTitle", widget: "string" }
              - { label: "Map Unavailable Text", name: "unavailableText", widget: "string" }
          - label: "Results and Saved Items Text"
            name: "results"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Count Suffix", name: "countSuffix", widget: "string" }
              - { label: "Updated Prefix", name: "updatedPrefix", widget: "string" }
              - { label: "Saved Note", name: "savedNote", widget: "text" }
              - { label: "Copy Saved Button", name: "copySavedLabel", widget: "string" }
              - { label: "Email Saved Button", name: "emailSavedLabel", widget: "string" }
              - { label: "Saved Group Title", name: "savedGroupTitle", widget: "string" }
              - { label: "Saved Group Text", name: "savedGroupText", widget: "text" }
              - { label: "Empty Saved Message", name: "emptySavedText", widget: "text" }
              - { label: "Empty New Message", name: "emptyNewText", widget: "text" }
              - { label: "Empty Message", name: "emptyText", widget: "text" }
              - { label: "Empty Filtered Message", name: "emptyFilteredText", widget: "text" }
              - { label: "Show More Button", name: "showMoreLabel", widget: "string" }
              - { label: "Show More Prefix", name: "showMorePrefix", widget: "string" }
              - { label: "Show More Suffix", name: "showMoreSuffix", widget: "string" }
          - label: "Card Action Labels"
            name: "actions"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Forward", name: "forwardLabel", widget: "string" }
              - { label: "Save", name: "saveLabel", widget: "string" }
              - { label: "Saved", name: "savedLabel", widget: "string" }
              - { label: "Details", name: "detailsLabel", widget: "string" }
              - { label: "Copy", name: "copyLabel", widget: "string" }
              - { label: "Copied", name: "copiedLabel", widget: "string" }
              - { label: "Copy Unavailable", name: "copyUnavailableLabel", widget: "string" }
              - { label: "New Badge", name: "newBadgeLabel", widget: "string" }
          - label: "Card Labels"
            name: "cards"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Event Label", name: "eventLabel", widget: "string" }
              - { label: "Days Left Label", name: "daysLeftLabel", widget: "string" }
              - { label: "Rolling Label", name: "rollingLabel", widget: "string" }
              - { label: "No Deadline Fallback", name: "sourceListedFallback", widget: "string" }
              - { label: "Online Fallback", name: "onlineFallback", widget: "string" }
              - { label: "Fields Label", name: "fieldsLabel", widget: "string" }
          - label: "Date Labels"
            name: "dateLabels"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Rolling", name: "rolling", widget: "string" }
              - { label: "Closed", name: "closed", widget: "string" }
              - { label: "Today", name: "today", widget: "string" }
              - { label: "One Day", name: "oneDay", widget: "string" }
              - { label: "Days Suffix", name: "daysSuffix", widget: "string" }
              - { label: "Deadline", name: "deadline", widget: "string" }
              - { label: "Final Deadline", name: "finalDeadline", widget: "string" }
              - { label: "Early Deadline", name: "earlyDeadline", widget: "string" }
              - { label: "Next Deadline", name: "nextDeadline", widget: "string" }
              - { label: "Application Due", name: "applicationDue", widget: "string" }
              - { label: "Proposal Due", name: "proposalDue", widget: "string" }
              - { label: "Submission Due", name: "submissionDue", widget: "string" }
              - { label: "Due Suffix", name: "dueSuffix", widget: "string" }
          - label: "Generated Quick Scan Text"
            name: "generatedInsights"
            widget: "object"
            collapsed: false
            hint: "These labels appear before automatically extracted source details."
            fields:
              - { label: "Matched Because Prefix", name: "matchedBecausePrefix", widget: "string" }
              - { label: "Matched Fallback", name: "matchedFallback", widget: "text" }
              - { label: "Submission Shape Prefix", name: "submissionShapePrefix", widget: "string" }
              - { label: "Formats Mentioned Prefix", name: "formatsMentionedPrefix", widget: "string" }
              - { label: "Contact Prefix", name: "contactPrefix", widget: "string" }
          - label: "Details Dialog Text"
            name: "dialog"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Close Label", name: "closeLabel", widget: "string" }
              - { label: "Details Accessibility Label", name: "detailsLabel", widget: "string" }
              - { label: "Deadline Fallback", name: "deadlineFallback", widget: "string" }
              - { label: "Days Left Label", name: "daysLeftLabel", widget: "string" }
              - { label: "Event Label", name: "eventLabel", widget: "string" }
              - { label: "Location Label", name: "locationLabel", widget: "string" }
              - { label: "Quick Scan Title", name: "quickScanTitle", widget: "string" }
              - { label: "Fields Label", name: "fieldsLabel", widget: "string" }
              - { label: "Open Source Button", name: "openSourceLabel", widget: "string" }
              - { label: "Done Button", name: "doneLabel", widget: "string" }
          - label: "Source Notes Section"
            name: "sourceSection"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Small Label Above Source Section Title", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Feed Title", name: "feedTitle", widget: "string" }
              - { label: "Feed Text", name: "feedText", widget: "text" }
              - { label: "Suggest Source Button", name: "suggestSourceLabel", widget: "string" }
              - { label: "Cadence Suffix", name: "cadenceSuffix", widget: "string" }
              - { label: "Watchlist Title", name: "watchlistTitle", widget: "string" }
              - { label: "Watchlist Text", name: "watchlistText", widget: "text" }
              - { label: "Watch Source Label", name: "watchSourceLabel", widget: "string" }
              - { label: "Suggest Email Subject", name: "suggestEmailSubject", widget: "string" }
              - { label: "Suggest Email Body", name: "suggestEmailBody", widget: "text" }

      - label: "Opportunity Sources"
        name: "opportunity_sources"
        file: "src/data/opportunity-sources.json"
        format: "json"
        fields:
          - { label: "Last Updated", name: "updated", widget: "string", hint: "Use YYYY-MM-DD." }
          - label: "Sources"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Request URL", name: "requestUrl", widget: "string", required: false }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Parser", name: "parser", widget: "string" }
              - label: "Confidence"
                name: "confidence"
                widget: "select"
                options: ["high", "medium", "low", "manual"]
              - label: "Publish Mode"
                name: "publish"
                widget: "select"
                options: ["auto", "candidate", "watch", "manual"]
              - { label: "Page Limit", name: "pageLimit", widget: "number", value_type: "int", min: 1, required: false }
              - { label: "Cadence", name: "cadence", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }

  - name: "archive"
    label: "Legacy Archive"
    files:
      - label: "Legacy Archive Page"
        name: "archive_settings"
        file: "src/data/archive/settings.json"
        format: "json"
        fields:
          - { label: "Browser Tab Title", name: "metaTitle", widget: "string" }
          - { label: "Search Engine Description", name: "metaDescription", widget: "text" }
          - { label: "Skip Link Text", name: "skipLinkText", widget: "string" }
          - { label: "Navigation Accessibility Label", name: "navigationLabel", widget: "string", hint: "Usually invisible, but useful for screen readers." }
          - label: "Top Navigation Links"
            name: "navLinks"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Hero Copy"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Small Label Above Archive Title", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Filter Labels"
            name: "filters"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accessibility Label", name: "ariaLabel", widget: "string" }
              - { label: "Search Label", name: "searchLabel", widget: "string" }
              - { label: "Search Placeholder", name: "searchPlaceholder", widget: "string" }
              - { label: "Category Label", name: "categoryLabel", widget: "string" }
              - { label: "All Categories Option", name: "allCategoriesLabel", widget: "string" }
              - { label: "Year Label", name: "yearLabel", widget: "string" }
              - { label: "All Years Option", name: "allYearsLabel", widget: "string" }
          - label: "Results Text"
            name: "results"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Count Suffix", name: "countSuffix", widget: "string" }
