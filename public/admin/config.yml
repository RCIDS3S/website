backend:
  name: github
  repo: RCIDS3S/website
  branch: main
  base_url: https://website-bgu.pages.dev
  auth_endpoint: api/auth

local_backend: true
publish_mode: editorial_workflow

media_folder: "public/assets/images"
public_folder: "/assets/images"

site_url: "https://website-bgu.pages.dev"
display_url: "https://website-bgu.pages.dev"
logo_url: "/assets/images/third-sophistic.png"

collections:
  - name: "settings"
    label: "Homepage and Site Settings"
    files:
      - label: "Identity and SEO"
        name: "identity"
        file: "src/data/site/identity.json"
        format: "json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Skip Link Text", name: "skipLinkText", widget: "string" }

      - label: "Navigation"
        name: "navigation"
        file: "src/data/site/navigation.json"
        format: "json"
        fields:
          - { label: "Events Link Text", name: "eventsText", widget: "string" }
          - { label: "Resources Link Text", name: "resourcesText", widget: "string" }
          - { label: "Opportunity Radar Link Text", name: "opportunitiesText", widget: "string" }
          - { label: "Officers Link Text", name: "officersText", widget: "string" }
          - { label: "About Link Text", name: "aboutText", widget: "string" }
          - { label: "Contact Link Text", name: "contactText", widget: "string" }
          - { label: "Archive Link Text", name: "archiveText", widget: "string" }

      - label: "Hero"
        name: "hero"
        file: "src/data/site/hero.json"
        format: "json"
        fields:
          - { label: "Small Label Above Hero Title", name: "eyebrow", widget: "string" }
          - { label: "Hero Title", name: "title", widget: "string" }
          - { label: "Hero Text", name: "text", widget: "text" }
          - { label: "Primary Button Text", name: "primaryActionText", widget: "string" }
          - { label: "Primary Button URL", name: "primaryActionUrl", widget: "string" }
          - { label: "Secondary Button Text", name: "secondaryActionText", widget: "string" }
          - { label: "Secondary Button URL", name: "secondaryActionUrl", widget: "string" }

      - label: "Student Desk"
        name: "student_desk"
        file: "src/data/site/student-desk.json"
        format: "json"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Term", name: "term", widget: "string" }

      - label: "Contact"
        name: "contact"
        file: "src/data/site/contact.json"
        format: "json"
        fields:
          - { label: "Small Label Above Contact Title", name: "kicker", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text", name: "text", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Email Button Text", name: "emailButtonText", widget: "string" }
          - { label: "Social URL", name: "socialUrl", widget: "string" }
          - { label: "Social Button Text", name: "socialButtonText", widget: "string" }

      - label: "Footer"
        name: "footer"
        file: "src/data/site/footer.json"
        format: "json"
        fields:
          - { label: "Footer Text", name: "text", widget: "string" }

      - label: "Student Desk Quick Links"
        name: "quick_links"
        file: "src/data/quick-links.json"
        format: "json"
        fields:
          - label: "Quick Links"
            name: "items"
            widget: "list"
            collapsed: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "about"
    label: "About"
    files:
      - label: "About Section"
        name: "about"
        file: "src/data/about.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            collapsed: false
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

  - name: "events"
    label: "Events"
    files:
      - label: "Events Section"
        name: "events"
        file: "src/data/events.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Calendar Integration"
            name: "calendar"
            widget: "object"
            collapsed: false
            hint: "Use this when S3S is ready to connect a public Google Calendar or Microsoft calendar. Manual event cards below remain the fallback."
            fields:
              - { label: "Show Connected Calendar", name: "enabled", widget: "boolean", default: false, hint: "Turn this on only after the public calendar URL or embed URL has been tested." }
              - label: "Calendar Provider"
                name: "provider"
                widget: "select"
                default: "manual"
                options:
                  - { label: "Manual cards only", value: "manual" }
                  - { label: "Google Calendar", value: "google" }
                  - { label: "Microsoft / Outlook Calendar", value: "microsoft" }
              - { label: "Public Calendar URL", name: "publicUrl", widget: "string", required: false, hint: "A public link people can open, such as a Google Calendar public URL or Microsoft published calendar URL." }
              - { label: "Embed URL", name: "embedUrl", widget: "string", required: false, hint: "Optional iframe/embed URL. Google Calendar and Microsoft calendars both need to be publicly shared before an embed will work for visitors." }
              - { label: "Calendar Button Text", name: "buttonText", widget: "string", default: "Open the S3S calendar" }
              - { label: "Editor Note", name: "note", widget: "text", required: false, hint: "Internal reminder for future editors. This note does not appear on the public site." }
          - label: "Events"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Display Date", name: "date", widget: "string" }
              - { label: "Machine Date", name: "datetime", widget: "string", hint: "Use YYYY-MM or YYYY-MM-DD." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Status", name: "status", widget: "string", default: "Details TBA" }

  - name: "resources"
    label: "Resources"
    files:
      - label: "Resources Section"
        name: "resources"
        file: "src/data/resources.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Resources"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}} - {{fields.title}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal", value: "normal" }
                  - { label: "Muted / Placeholder", value: "muted" }

  - name: "officers"
    label: "Officers"
    files:
      - label: "Officers Section"
        name: "officers"
        file: "src/data/officers.json"
        format: "json"
        fields:
          - { label: "Small Label Above Section Title", name: "kicker", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Text", name: "text", widget: "text" }
          - label: "Officers"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.role}} - {{fields.name}}"
            fields:
              - { label: "Show Role", name: "showRole", widget: "boolean", default: true }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "opportunity_intro"
    label: "Opportunity Radar"
    description: "Safe editing area. Routine editors can change the public introduction and suggest source URLs here. The live feed, source configuration, filters, parser code, and automation are protected maintainer areas."
    files:
      - label: "Opportunity Radar Introduction"
        name: "opportunity_intro"
        file: "src/data/opportunities-page.json"
        format: "json"
        fields:
          - { label: "Small Label Above Page Title", name: "kicker", widget: "string", hint: "Safe to edit. This changes only the public introduction." }
          - { label: "Page Title", name: "title", widget: "string", hint: "Safe to edit. This does not change the feed itself." }
          - { label: "Introduction", name: "text", widget: "text", hint: "Safe to edit. Feed items, filters, sources, and automation are maintained separately." }

      - label: "Radar Source Suggestions"
        name: "opportunity_source_suggestions"
        file: "src/data/opportunity-source-suggestions.json"
        format: "json"
        fields:
          - label: "Suggested URLs"
            name: "items"
            widget: "list"
            collapsed: false
            summary: "{{fields.sourceName}} - {{fields.status}}"
            hint: "Safe to edit. Adding a URL here does not add it to the live feed. A Radar maintainer must review and promote it."
            fields:
              - { label: "Source Name", name: "sourceName", widget: "string" }
              - { label: "URL", name: "url", widget: "string", hint: "Paste the page that might be useful to monitor." }
              - { label: "Suggested By", name: "suggestedBy", widget: "string", required: false }
              - { label: "Date Suggested", name: "dateSuggested", widget: "string", required: false, hint: "Use YYYY-MM-DD if known." }
              - { label: "Why This Might Help RCID Students", name: "whyUseful", widget: "text", required: false }
              - label: "Status"
                name: "status"
                widget: "select"
                default: "new"
                options:
                  - { label: "New suggestion", value: "new" }
                  - { label: "Needs review", value: "needs-review" }
                  - { label: "Promoted to maintainer review", value: "promoted" }
                  - { label: "Not a fit", value: "declined" }
              - { label: "Maintainer Notes", name: "maintainerNotes", widget: "text", required: false, hint: "Optional. This queue is not connected to the live feed." }

  - name: "archive"
    label: "Legacy Archive"
    files:
      - label: "Legacy Archive Page"
        name: "archive_settings"
        file: "src/data/archive/settings.json"
        format: "json"
        fields:
          - { label: "Browser Tab Title", name: "metaTitle", widget: "string" }
          - { label: "Search Engine Description", name: "metaDescription", widget: "text" }
          - { label: "Skip Link Text", name: "skipLinkText", widget: "string" }
          - { label: "Navigation Accessibility Label", name: "navigationLabel", widget: "string", hint: "Usually invisible, but useful for screen readers." }
          - label: "Top Navigation Links"
            name: "navLinks"
            widget: "list"
            collapsed: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Hero Copy"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Small Label Above Archive Title", name: "kicker", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Filter Labels"
            name: "filters"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accessibility Label", name: "ariaLabel", widget: "string" }
              - { label: "Search Label", name: "searchLabel", widget: "string" }
              - { label: "Search Placeholder", name: "searchPlaceholder", widget: "string" }
              - { label: "Category Label", name: "categoryLabel", widget: "string" }
              - { label: "All Categories Option", name: "allCategoriesLabel", widget: "string" }
              - { label: "Year Label", name: "yearLabel", widget: "string" }
              - { label: "All Years Option", name: "allYearsLabel", widget: "string" }
          - label: "Results Text"
            name: "results"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Count Suffix", name: "countSuffix", widget: "string" }
